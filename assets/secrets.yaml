# OpenTalon Secrets
# Keep this file local or store it in a
# secrets manager (Vault, AWS Secrets Manager, etc.) and inject at runtime.
#
# Uncomment and fill in the values you need.
# Any key left commented out falls back to the corresponding environment variable
# (e.g. ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.).

# ─── LLM API Keys ─────────────────────────────────────────────────────────────
# Keys are matched by provider name — the prefix before "/" in config.yaml llm.model.
# At least one key is required for the agent to function.
#
# auth:
#   anthropic: "sk-ant-api03-..."   # anthropic/claude-*
#   openai:    "sk-proj-..."        # openai/gpt-*
#   mistral:   "..."                # mistral/mistral-*
#   minimax:   "..."                # minimax/MiniMax-*  (platform.minimaxi.chat)
#   google:    "..."                # google/gemini-*    (aistudio.google.com)
#   groq:      "gsk_..."            # groq/* (if defined in providers below)

# ─── Custom Providers ─────────────────────────────────────────────────────────
# Define custom backends here, then reference them in config.yaml as "name/model".
# The API key can be set in auth.<name> above or inline here.
# type: openai — OpenAI-compatible REST API (the only supported type for now)
#
# providers:
#   - name: groq
#     type: openai
#     baseURL: "https://api.groq.com/openai/v1"
#
#   - name: together
#     type: openai
#     baseURL: "https://api.together.xyz/v1"
#
#   - name: ollama
#     type: openai
#     baseURL: "http://localhost:11434/v1"
#     # no apiKey needed for local Ollama

# ─── Telegram ─────────────────────────────────────────────────────────────────
# Obtain from @BotFather: https://t.me/BotFather
#
# telegram:
#   botToken: "1234567890:AABBCCDDEEFFaabbccddeeff-1234567890"

# ─── Tools ────────────────────────────────────────────────────────────────────
# API keys for built-in tools.
#
# tools:
#   braveApiKey: "BSA..."   # required for web_search (api.search.brave.com)

# ─── Dashboard ────────────────────────────────────────────────────────────────
# Protects all /dashboard and /api/* routes with Bearer token auth.
# Leave commented for open (unauthenticated) access — only do this on localhost.
#
# dashboard:
#   password: "choose-a-strong-password"
