services:
  # --- Relational State (Postgres) ---
  postgres:
    image: postgres:16-alpine
    container_name: openpincer-db
    restart: always
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: openpincer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # --- Vector Memory (Qdrant) ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: openpincer-vector
    restart: always
    ports:
      - "6333:6333" # REST API & Web UI
      - "6334:6334" # gRPC API (Fastest for Node.js)
    volumes:
      - qdrantdata:/qdrant/storage
    environment:
      - QDRANT__SERVICE__ENABLE_STATIC_CONTENT=true # Enables the Web UI dashboard

  # --- Database GUI (Optional but helpful for Phase 4 dev) ---
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

  # --- Local Embedding Service (FastEmbed) ---
  fastembed:
    image: itsobaa/fastembed:latest
    container_name: openpincer-embed
    ports:
      - "8000:8000"
    environment:
      - FASTEMBED_MODEL=BAAI/bge-large-en-v1.5
      - FASTEMBED_PORT=8000
    # Optional: Pre-download model to a volume to speed up restarts
    volumes:
      - fastembed:/root/.cache/fastembed

volumes:
  pgdata:
  qdrantdata:
  fastembed:
