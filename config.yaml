# OpenPincer Configuration
# This file is safe to commit to version control.
# Secrets (API keys, tokens) belong in secrets.yaml — never here.
#
# All values are optional. If omitted, the corresponding environment variable
# (legacy or infrastructure) is used as a fallback.
#
# Hot-reload: changes take effect on the next request without restarting the server.

# ─── LLM ──────────────────────────────────────────────────────────────────────
llm:
  # Primary model in "provider/model" format.
  # If omitted, the first provider with an API key in secrets.yaml is used.
  #
  # Built-in providers:
  #   anthropic  → requires anthropicApiKey in secrets.yaml
  #   openai     → requires openaiApiKey
  #   mistral    → requires mistralApiKey
  #   minimax    → requires minimaxApiKey
  #   google     → requires googleApiKey
  #
  # Custom OpenAI-compatible backends (Groq, Together, Ollama, etc.) are defined
  # in secrets.yaml under providers[] and referenced by name here.
  #
  # Examples:
  #   model: anthropic/claude-sonnet-4-5
  #   model: openai/gpt-4o
  #   model: google/gemini-2.0-flash
  #   model: mistral/mistral-large-latest
  #   model: groq/llama-3.3-70b-versatile   # custom provider named "groq"
  model: anthropic/claude-sonnet-4-5

  # Ordered fallback models tried if the primary model fails (rate limit, outage, etc.).
  # Comment out or leave empty to disable fallbacks.
  #
  # fallbacks:
  #   - google/gemini-2.0-flash
  #   - openai/gpt-4o
  #   - mistral/mistral-large-latest

  # Sampling temperature (0 = deterministic, 2 = very creative). Default: 0.7
  temperature: 0.7

  # Maximum number of tool-use steps per request. Default: 10
  maxSteps: 50

  # Strip <think>...</think> reasoning tokens from model responses. Default: false (stripped).
  # Set to true to include chain-of-thought in Telegram replies.
  # showThinking: true

# ─── Memory ───────────────────────────────────────────────────────────────────
memory:
  # Enable long-term vector memory (requires Qdrant + FastEmbed). Default: true
  enabled: true

# ─── Telegram ─────────────────────────────────────────────────────────────────
telegram:
  # true  → long-polling (good for local development, no public URL needed)
  # false → webhook mode (recommended for production)
  useLongPolling: false

  # Restrict the bot to a single Telegram user ID.
  # Leave commented to allow any user to interact with the bot.
  # ownerId: 123456789

# ─── Tools ────────────────────────────────────────────────────────────────────
tools:
  # "*" permits all built-in tools, or supply an explicit allowlist:
  # allowlist:
  #   - run_command
  #   - web_search
  #   - search_memory
  #   - skill_list
  #   - skill_run
  allowlist: "*"

  # Tools listed here require explicit user approval (HITL) before executing.
  dangerousTools:
    - run_command
    - run_shell

  # Shell binary used by run_command / run_shell. Default: /bin/bash
  shell: /bin/bash

  # Base directory for agent file operations. Defaults to process.cwd().
  # agentWorkspace: /home/user/workspace

  # Directory scanned for skill definitions. Defaults to <agentWorkspace>/skills.
  # skillsDir: /home/user/workspace/skills

  # ── Agent Browser ───────────────────────────────────────────────────────────
  # Headless Chromium tools powered by the agent-browser CLI.
  # Install: npm install -g agent-browser && agent-browser install
  # Tools enabled: browser_navigate, browser_snapshot, browser_get,
  #                browser_act (HITL), browser_screenshot, browser_close
  #
  # agentBrowserEnabled: true
  # agentBrowserBin: agent-browser   # or full path, e.g. /usr/local/bin/agent-browser

  # ── MCP Servers ─────────────────────────────────────────────────────────────
  # Connect to any number of Model Context Protocol servers. Each server's
  # tools are automatically registered alongside the built-in tools.
  #
  # mcpServers:
  #   - name: filesystem          # human-readable label (shown in logs)
  #     command: npx              # executable to launch
  #     args:
  #       - -y
  #       - "@modelcontextprotocol/server-filesystem"
  #       - /home/user/workspace
  #
  #   - name: brave-search
  #     command: npx
  #     args:
  #       - -y
  #       - "@modelcontextprotocol/server-brave-search"
  #     env:
  #       BRAVE_API_KEY: "your-key"
